services:
  backend:
    build: ./backend
    environment:
      - DB_PATH=/app/data/rnieb.db # path of db in container
      - UPLOAD_PATH=/app/data/uploads/ # uploads destination
      - DOTENV_PATH=/app/data/.env # backend secrets ( jwt secret... )
    volumes:
      - ./backend/data:/app/data/ # mounts ./data as /app/data in container
    # ---- DEV ONLY: EXPOSE BACKEND SO WE CAN CONNECT TO IT VIA DEV FRONTEND -------------
    ports:
      - "8080:8080"
    # ------------------------------------------------------------------------------------
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
