services:
  backend:
    build: ./backend
    environment:
      - DB_PATH=/app/data/rnieb.db # path of db in container
      - UPLOAD_PATH=/app/data/uploads/ # uploads destination
      - DOTENV_PATH=/app/data/.env
    volumes:
      - ./backend/data:/app/data/ # mounts ./data as /app/data in container
  frontend:
    build: ./frontend
    ports:
      - "80:80" # expose http port
      - "443:443" # expose https port
    depends_on:
      - backend

        # port 80 is the default http port
        # won't work on localhost since it's probably already being used by smth else
        # port 443 is https
        # same deal on localhost
